{% extends "base.html" %}
{% block title %}Historial Medico - MedCenter{% endblock %}
{% block page_title %}Historial Medico{% endblock %}

{% block content %}
<div id="history-view" class="space-y-6">
    <div id="loading">
        <div class="card-premium p-6">
            <div class="skeleton skeleton-text"></div>
            <div class="skeleton skeleton-text"></div>
            <div class="skeleton skeleton-text"></div>
        </div>
    </div>
    <div id="history-content" class="hidden"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
const HistoryView = {
    async init() {
        const user = await AppAuth.requireAuth();
        if (!user) return;

        let patientId;
        if (user.role === 'paciente') {
            patientId = user.patient_profile?.id;
            if (!patientId) { Toasts.error('Sin perfil de paciente'); return; }
        } else {
            Toasts.error('Acceso no autorizado');
            return;
        }

        await this.load(patientId);
    },

    async load(patientId) {
        const container = document.getElementById('history-content');
        document.getElementById('loading').classList.add('hidden');
        container.classList.remove('hidden');

        try {
            const data = await Api.get(Endpoints.medical.patientHistory(patientId));
            const items = data.items || [];

            if (items.length === 0) {
                container.innerHTML = `
                    <div class="card-premium p-12 text-center">
                        <svg class="w-12 h-12 text-slate-300 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
                        <p class="text-slate-500">No tienes consultas registradas</p>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <p class="text-sm text-slate-500 mb-4">${items.length} consulta(s) en tu historial</p>
                <div class="space-y-4">
                    ${items.map(r => `
                        <div class="card-premium p-6">
                            <div class="flex items-center justify-between mb-3">
                                <div>
                                    <p class="text-sm font-bold text-slate-800">${Utils.formatDate(r.created_at)}</p>
                                    <p class="text-xs text-slate-500">Dr. ${r.doctor_name}</p>
                                </div>
                                <span class="badge bg-emerald-100 text-emerald-700">Completada</span>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                                ${r.reason ? `<div><p class="text-xs text-slate-400">Motivo</p><p class="text-slate-700">${r.reason}</p></div>` : ''}
                                ${r.diagnosis ? `<div><p class="text-xs text-slate-400">Diagnostico</p><p class="text-slate-700">${r.diagnosis}</p></div>` : ''}
                                ${r.treatment ? `<div><p class="text-xs text-slate-400">Tratamiento</p><p class="text-slate-700">${r.treatment}</p></div>` : ''}
                                ${r.blood_pressure ? `<div><p class="text-xs text-slate-400">Presion</p><p class="text-slate-700">${r.blood_pressure}</p></div>` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        } catch (err) {
            container.innerHTML = `<div class="card-premium p-6 text-center text-red-500">${err.message}</div>`;
        }
    },
};

document.addEventListener('DOMContentLoaded', () => HistoryView.init());
</script>
{% endblock %}
