    <style>
        * { font-family: "Inter", sans-serif; }
        .hero-bg { background: linear-gradient(135deg, #0d4f6c 0%, #1a7a8a 50%, #22a698 100%); }
        .card-hover { transition: transform 0.25s ease, box-shadow 0.25s ease; }
        .card-hover:hover { transform: translateY(-6px); box-shadow: 0 24px 40px -8px rgba(0,0,0,0.12); }
        .pulse-ring { animation: pulse-ring 2s cubic-bezier(0.455,0.03,0.515,0.955) infinite; }
        @keyframes pulse-ring {
            0%   { box-shadow: 0 0 0 0 rgba(20,184,166,.6); }
            70%  { box-shadow: 0 0 0 14px rgba(20,184,166,0); }
            100% { box-shadow: 0 0 0 0 rgba(20,184,166,0); }
        }
        .chat-window { transform-origin: bottom right; animation: slideUp 0.25s ease; }
        @keyframes slideUp {
            from { opacity:0; transform: scale(0.85) translateY(20px); }
            to   { opacity:1; transform: scale(1) translateY(0); }
        }
        .dot { animation: blink 1.2s infinite; display:inline-block; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
        .stat-num { font-size: clamp(1.8rem,4vw,2.5rem); }
    </style>
</head>

<button id="chat-btn" aria-label="Abrir asistente virtual" class="fixed bottom-6 right-6 z-50 w-16 h-16 bg-teal-600 text-white rounded-full shadow-2xl flex items-center justify-center pulse-ring hover:bg-teal-700 transition">
    <svg id="chat-icon" class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M21 16c0 1.1-.9 2-2 2H7l-4 4V6a2 2 0 012-2h14a2 2 0 012 2v10z"/></svg>
    <svg id="close-icon" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
</button>
<div id="chat-window" class="hidden fixed bottom-28 right-4 sm:right-6 z-50 w-[calc(100vw-2rem)] sm:w-96 bg-white rounded-2xl shadow-2xl border border-slate-100 flex flex-col overflow-hidden chat-window" style="max-height:520px">
    <div class="bg-teal-600 text-white px-5 py-4 flex items-center gap-3">
        <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-lg">&#x1F916;</div>
        <div>
            <div class="font-bold text-sm">Asistente MedCenter</div>
            <div class="text-xs text-teal-100 flex items-center gap-1"><span class="w-2 h-2 bg-green-400 rounded-full inline-block"></span> En linea</div>
        </div>
    </div>
    <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-3" style="max-height:320px">
        <div class="flex gap-2 items-end">
            <div class="w-7 h-7 bg-teal-100 rounded-full flex items-center justify-center text-sm shrink-0">&#x1F916;</div>
            <div class="bg-slate-100 text-slate-800 text-sm rounded-2xl rounded-bl-sm px-4 py-3 max-w-xs leading-relaxed">Hola! &#x1F44B; Soy el asistente de <strong>MedCenter</strong>. En que puedo ayudarte hoy?</div>
        </div>
        <div id="quick-options" class="flex flex-wrap gap-2 pl-9">
            <button onclick="handleOption('agendar')" class="text-xs bg-teal-50 text-teal-700 border border-teal-200 px-3 py-1.5 rounded-full hover:bg-teal-100 transition">&#x1F4C5; Agendar cita</button>
            <button onclick="handleOption('especialidad')" class="text-xs bg-teal-50 text-teal-700 border border-teal-200 px-3 py-1.5 rounded-full hover:bg-teal-100 transition">&#x1F50D; Especialidades</button>
            <button onclick="handleOption('cuenta')" class="text-xs bg-teal-50 text-teal-700 border border-teal-200 px-3 py-1.5 rounded-full hover:bg-teal-100 transition">&#x1F464; Crear cuenta</button>
            <button onclick="handleOption('precios')" class="text-xs bg-teal-50 text-teal-700 border border-teal-200 px-3 py-1.5 rounded-full hover:bg-teal-100 transition">&#x1F4B0; Precios</button>
        </div>
    </div>
    <div class="border-t border-slate-100 p-3 flex gap-2">
        <input id="chat-input" type="text" placeholder="Escribe tu mensaje..." class="flex-1 text-sm px-4 py-2.5 border border-slate-200 rounded-full focus:outline-none focus:ring-2 focus:ring-teal-400 bg-slate-50" onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()" class="w-10 h-10 bg-teal-600 text-white rounded-full flex items-center justify-center hover:bg-teal-700 transition shrink-0">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
        </button>
    </div>
</div>

<script>
    window.addEventListener('scroll',()=>{document.getElementById('navbar').classList.toggle('shadow-md',window.scrollY>10);});
    const menuBtn=document.getElementById('menu-btn'),mobileMenu=document.getElementById('mobile-menu'),iconOpen=document.getElementById('icon-open'),iconClose=document.getElementById('icon-close');
    menuBtn.addEventListener('click',()=>{const o=mobileMenu.classList.toggle('hidden');iconOpen.classList.toggle('hidden',!o);iconClose.classList.toggle('hidden',o);});
    document.querySelectorAll('.mobile-link').forEach(l=>l.addEventListener('click',()=>{mobileMenu.classList.add('hidden');iconOpen.classList.remove('hidden');iconClose.classList.add('hidden');}));
    const chatBtn=document.getElementById('chat-btn'),chatWindow=document.getElementById('chat-window'),chatIconEl=document.getElementById('chat-icon'),closeIconEl=document.getElementById('close-icon');
    chatBtn.addEventListener('click',()=>{const h=chatWindow.classList.toggle('hidden');chatIconEl.classList.toggle('hidden',!h);closeIconEl.classList.toggle('hidden',h);if(!h)document.getElementById('chat-input').focus();});
    const responses={
        agendar:{text:'Para agendar una cita necesitas tener una cuenta. Es gratis y solo toma 2 minutos.',options:[{label:'Crear cuenta',action:'ir_registro'},{label:'Ya tengo cuenta',action:'ir_login'}]},
        especialidad:{text:'Contamos con mas de 12 especialidades: Cardiologia, Pediatria, Ginecologia, Neurologia, Odontologia, Oftalmologia, Nutriologia y mas.',options:[{label:'Ver todas',action:'ir_registro'},{label:'Agendar cita',action:'agendar'}]},
        cuenta:{text:'Crear una cuenta en MedCenter es completamente gratis. Solo necesitas tu nombre y correo electronico.',options:[{label:'Crear cuenta gratis',action:'ir_registro'},{label:'Ya tengo cuenta',action:'ir_login'}]},
        precios:{text:'Para pacientes el servicio es GRATUITO. Para clinicas tenemos planes desde basico hasta empresarial.',options:[{label:'Registrarme gratis',action:'ir_registro'},{label:'Soy medico/clinica',action:'ir_registro'}]},
        ir_registro:{redirect:'/register'},
        ir_login:{redirect:'/login'},
        default:{text:'No estoy seguro de entender tu pregunta. Puedo ayudarte con alguna de estas opciones?',options:[{label:'Agendar cita',action:'agendar'},{label:'Crear cuenta',action:'cuenta'},{label:'Especialidades',action:'especialidad'}]}
    };
    function addMessage(text,isUser=false){const msgs=document.getElementById('chat-messages');const div=document.createElement('div');div.className=isUser?'flex justify-end':'flex gap-2 items-end';if(isUser){div.innerHTML=`<div class="bg-teal-600 text-white text-sm rounded-2xl rounded-br-sm px-4 py-3 max-w-xs leading-relaxed">${text}</div>`;}else{div.innerHTML=`<div class="w-7 h-7 bg-teal-100 rounded-full flex items-center justify-center text-sm shrink-0">&#x1F916;</div><div class="bg-slate-100 text-slate-800 text-sm rounded-2xl rounded-bl-sm px-4 py-3 max-w-xs leading-relaxed">${text}</div>`;}msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;}
    function addOptions(opts){const msgs=document.getElementById('chat-messages');const div=document.createElement('div');div.className='flex flex-wrap gap-2 pl-9';opts.forEach(o=>{const btn=document.createElement('button');btn.className='text-xs bg-teal-50 text-teal-700 border border-teal-200 px-3 py-1.5 rounded-full hover:bg-teal-100 transition';btn.textContent=o.label;btn.onclick=()=>handleOption(o.action);div.appendChild(btn);});msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;}
    function showTyping(){const msgs=document.getElementById('chat-messages');const div=document.createElement('div');div.id='typing-indicator';div.className='flex gap-2 items-end';div.innerHTML=`<div class="w-7 h-7 bg-teal-100 rounded-full flex items-center justify-center text-sm shrink-0">&#x1F916;</div><div class="bg-slate-100 text-slate-800 text-sm rounded-2xl rounded-bl-sm px-4 py-3 flex gap-1"><span class="dot w-2 h-2 bg-slate-400 rounded-full"></span><span class="dot w-2 h-2 bg-slate-400 rounded-full"></span><span class="dot w-2 h-2 bg-slate-400 rounded-full"></span></div>`;msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;}
    function removeTyping(){const t=document.getElementById('typing-indicator');if(t)t.remove();}
    function handleOption(action){document.getElementById('quick-options')?.remove();const resp=responses[action];if(!resp)return;if(resp.redirect){window.location.href=resp.redirect;return;}addMessage(action.replace(/_/g,' '),true);showTyping();setTimeout(()=>{removeTyping();addMessage(resp.text);if(resp.options)addOptions(resp.options);},800);}
    function sendMessage(){const input=document.getElementById('chat-input');const text=input.value.trim();if(!text)return;input.value='';addMessage(text,true);showTyping();const lower=text.toLowerCase();let action='default';if(lower.match(/cita|agendar|reserv|turno/))action='agendar';else if(lower.match(/especialid|medico|doctor/))action='especialidad';else if(lower.match(/cuenta|registr/))action='cuenta';else if(lower.match(/precio|costo|plan|gratis/))action='precios';else if(lower.match(/hola|buenos|hi|hello/))action='saludo';const resp=responses[action]||responses['default'];setTimeout(()=>{removeTyping();if(action==='saludo'){addMessage('Hola! En que puedo ayudarte hoy?');addOptions([{label:'Agendar cita',action:'agendar'},{label:'Crear cuenta',action:'cuenta'},{label:'Especialidades',action:'especialidad'}]);}else{addMessage(resp.text);if(resp.options)addOptions(resp.options);}},900);}
<\/script>
