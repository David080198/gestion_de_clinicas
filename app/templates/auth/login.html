<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesion - MedCenter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: { primary: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' } },
                fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
            }}
        }
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="h-full bg-gradient-to-br from-slate-50 via-slate-50 to-indigo-50">
    <div id="toast-container"></div>

    <div class="min-h-full flex flex-col items-center justify-center px-4 py-12">
        <!-- Decorative blur background -->
        <div class="absolute inset-0 -z-10 overflow-hidden">
            <div class="absolute top-20 right-1/4 w-96 h-96 bg-primary-200/20 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-20 left-1/4 w-96 h-96 bg-primary-300/10 rounded-full blur-3xl"></div>
        </div>

        <!-- Card container -->
        <div class="w-full max-w-md">
            
            <!-- Logo and title -->
            <div class="text-center mb-10">
                <div class="flex justify-center mb-4">
                    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="MedCenter" class="h-16 w-auto">
                </div>
                <p class="text-slate-500">Tu plataforma de gestion medica digital</p>
            </div>

            <!-- Form card -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 mb-6">
                
                <div class="mb-8">
                    <h2 class="text-xl font-semibold text-slate-800 mb-1">Bienvenido de nuevo</h2>
                    <p class="text-slate-500 text-sm">Inicia sesion para acceder a tu panel</p>
                </div>

                <!-- Formulario -->
                <form id="login-form" class="space-y-5">

                    <div>
                        <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">Correo electronico</label>
                        <input type="email" id="email" name="email" required
                               class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-100 transition text-slate-900 placeholder-slate-400"
                               placeholder="doctor@clinica.com"
                               autocomplete="email">
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">Contrasena</label>
                        <div class="relative">
                            <input type="password" id="password" name="password" required
                                   class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-100 transition text-slate-900 placeholder-slate-400 pr-10"
                                   placeholder="Minimo 8 caracteres"
                                   autocomplete="current-password">
                            <button type="button" onclick="Utils.togglePassword('password', this)"
                                    class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center justify-between pt-2">
                        <label class="flex items-center gap-2 text-slate-600 cursor-pointer select-none">
                            <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-primary-600 focus:ring-primary-500/20 transition">
                            <span class="text-sm">Recordarme</span>
                        </label>
                        <a href="#" class="text-primary-600 hover:text-primary-700 font-medium text-sm transition-colors">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" id="login-btn"
                            class="w-full py-2.5 px-4 bg-primary-600 hover:bg-primary-700 text-white font-semibold rounded-lg transition-colors flex items-center justify-center gap-2">
                        <span id="login-text">Iniciar sesion</span>
                        <div id="login-spinner" class="spinner hidden"></div>
                    </button>
                </form>

                <!-- Enlace a registro -->
                <p class="mt-8 text-center text-sm text-slate-600">
                    ¿Eres paciente nuevo?
                    <a href="/register" class="text-primary-600 hover:text-primary-700 font-semibold transition-colors">Registrate aqui</a>
                </p>
            </div>

            <!-- Footer -->
            <div class="mt-10 text-center">
                <p class="text-xs text-slate-400 mb-3">&copy; 2026 MedCenter. Todos los derechos reservados.</p>
                <a href="https://codexsoto.com/" target="_blank" rel="noopener" class="inline-flex items-center gap-1.5 text-slate-500 hover:text-slate-700 transition text-xs">
                    <span>Powered by</span>
                    <span class="font-semibold">CodexSoto</span>
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg>
                </a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/toasts.js') }}"></script>
    <script>
        (async () => {
            try {
                const resp = await fetch('/api/auth/me', { credentials: 'same-origin' });
                if (resp.ok) {
                    const data = await resp.json();
                    if (data.user) window.location.href = '/dashboard';
                }
            } catch (e) {}
        })();

        Utils = {
            togglePassword(id, btn) {
                const input = document.getElementById(id);
                input.type = input.type === 'password' ? 'text' : 'password';
            }
        };

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const text = document.getElementById('login-text');
            const spinner = document.getElementById('login-spinner');
            btn.disabled = true;
            text.textContent = 'Iniciando...';
            spinner.classList.remove('hidden');

            try {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                await Api.post(Endpoints.auth.login, { email, password });
                Toasts.success('Sesion iniciada correctamente');
                setTimeout(() => window.location.href = '/dashboard', 500);
            } catch (err) {
                Toasts.error(err.message || 'Credenciales invalidas');
                btn.disabled = false;
                text.textContent = 'Iniciar sesion';
                spinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
