<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - MedCenter Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: { primary: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' } },
                fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], display: ['DM Serif Display', 'serif'] }
            }}
        }
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
</head>
<body class="h-full bg-slate-50">
    <div id="toast-container"></div>

    <div class="min-h-full flex items-center justify-center px-6 py-12">
        <div class="w-full max-w-2xl">

            <!-- Logo -->
            <div class="flex items-center justify-center mb-8">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="MedCenter" class="h-12 w-auto">
            </div>

            <div class="card-premium p-8">

                <h1 class="text-2xl font-bold text-slate-800 mb-2">Registro de paciente</h1>
                <p class="text-slate-500 text-sm mb-6">Crea tu cuenta para agendar citas y consultar tu historial medico</p>

                <form id="register-form" class="space-y-5">

                    <!-- Datos de cuenta -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Nombre(s) *</label>
                            <input type="text" id="first_name" required class="input-premium" placeholder="Juan">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Apellido(s) *</label>
                            <input type="text" id="last_name" required class="input-premium" placeholder="Perez">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Correo electronico *</label>
                            <input type="email" id="email" required class="input-premium" placeholder="juan@email.com">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Telefono</label>
                            <input type="tel" id="phone" class="input-premium" placeholder="+52 555 123 4567">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Contrasena *</label>
                        <input type="password" id="password" required minlength="8" class="input-premium" placeholder="Minimo 8 caracteres">
                    </div>

                    <hr class="border-slate-200">

                    <!-- Datos clinicos -->
                    <p class="text-sm font-bold text-slate-700 uppercase tracking-wide">Datos del paciente</p>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Documento de identidad *</label>
                            <input type="text" id="document_number" required class="input-premium" placeholder="DNI / CURP / Pasaporte">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Fecha de nacimiento</label>
                            <input type="date" id="birth_date" class="input-premium">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Sexo</label>
                            <select id="gender" class="input-premium">
                                <option value="masculino">Masculino</option>
                                <option value="femenino">Femenino</option>
                                <option value="otro">Otro</option>
                                <option value="no_especificado" selected>No especificado</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Tipo de sangre</label>
                            <select id="blood_type" class="input-premium">
                                <option value="">Desconocido</option>
                                <option value="O+">O+</option><option value="O-">O-</option>
                                <option value="A+">A+</option><option value="A-">A-</option>
                                <option value="B+">B+</option><option value="B-">B-</option>
                                <option value="AB+">AB+</option><option value="AB-">AB-</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Alergias conocidas</label>
                        <input type="text" id="allergies" class="input-premium" placeholder="Ej: Penicilina, aspirina...">
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Contacto de emergencia</label>
                            <input type="text" id="emergency_contact_name" class="input-premium" placeholder="Nombre">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Telefono de emergencia</label>
                            <input type="tel" id="emergency_contact_phone" class="input-premium" placeholder="+52 555 000 0000">
                        </div>
                    </div>

                    <button type="submit" id="register-btn" class="btn-primary w-full justify-center">
                        <span id="register-text">Crear cuenta</span>
                        <div id="register-spinner" class="spinner hidden"></div>
                    </button>
                </form>

                <p class="mt-6 text-center text-sm text-slate-500">
                    Ya tienes cuenta?
                    <a href="/login" class="text-primary-600 hover:text-primary-700 font-semibold">Inicia sesion</a>
                </p>

                <!-- Branding CodexSoto -->
                <div class="mt-8 flex justify-center">
                    <a href="https://codexsoto.com/" target="_blank" rel="noopener" class="codexsoto-brand">
                        <span>Powered by</span>
                        <span class="font-semibold tracking-tight text-slate-500">CodexSoto</span>
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/toasts.js') }}"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('register-btn');
            const text = document.getElementById('register-text');
            const spinner = document.getElementById('register-spinner');
            btn.disabled = true;
            text.textContent = 'Creando...';
            spinner.classList.remove('hidden');

            const payload = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                phone: document.getElementById('phone').value || null,
                role: 'paciente',
                document_number: document.getElementById('document_number').value,
                birth_date: document.getElementById('birth_date').value || null,
                gender: document.getElementById('gender').value,
                blood_type: document.getElementById('blood_type').value || null,
                allergies: document.getElementById('allergies').value || null,
                emergency_contact_name: document.getElementById('emergency_contact_name').value || null,
                emergency_contact_phone: document.getElementById('emergency_contact_phone').value || null,
            };

            try {
                await Api.post(Endpoints.auth.register, payload);
                Toasts.success('Cuenta creada. Iniciando sesion...');
                // Auto-login tras registro
                setTimeout(async () => {
                    try {
                        await Api.post(Endpoints.auth.login, {
                            email: payload.email,
                            password: payload.password,
                        });
                        window.location.href = '/dashboard';
                    } catch (e) {
                        window.location.href = '/login';
                    }
                }, 800);
            } catch (err) {
                Toasts.error(err.message || 'Error al registrar');
                btn.disabled = false;
                text.textContent = 'Crear cuenta';
                spinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
