<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error {{ code }} - MedCenter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { primary: { 600:'#4f46e5',700:'#4338ca',900:'#312e81' } } } } }</script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
</head>
<body class="h-full bg-slate-50 flex items-center justify-center px-6">
    <div class="text-center max-w-md">
        <div class="text-8xl font-bold text-primary-600 mb-4">{{ code }}</div>
        <h1 class="text-2xl font-bold text-slate-800 mb-2">{{ title }}</h1>
        <p class="text-slate-500 mb-8">{{ message }}</p>
        <a href="/dashboard" class="btn-primary inline-flex">Volver al dashboard</a>
    </div>
</body>
</html>
