<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MedCenter Premium{% endblock %}</title>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50:  '#eef2ff',
                            100: '#e0e7ff',
                            200: '#c7d2fe',
                            300: '#a5b4fc',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            800: '#3730a3',
                            900: '#312e81',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        display: ['DM Serif Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <!-- CSS personalizado -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-slate-50 text-slate-800">

    <!-- Toast container -->
    <div id="toast-container"></div>

    {% block body %}
    <!-- Layout principal con sidebar -->
    <div class="flex h-screen overflow-hidden">

        <!-- ============================ Sidebar ============================ -->
        <aside id="sidebar"
               class="fixed lg:static inset-y-0 left-0 z-50 w-72 bg-white border-r border-slate-200/80 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col">

            <!-- Logo / Marca -->
            <div class="flex items-center gap-3 px-6 py-5 border-b border-slate-100">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-600 to-indigo-700 flex items-center justify-center shadow-sm">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
                    </svg>
                </div>
                <div>
                    <p class="text-lg font-bold text-slate-800 tracking-tight">MedCenter</p>
                    <p class="text-[10px] text-slate-400 -mt-0.5 tracking-widest uppercase">Premium Medical Tech</p>
                </div>
            </div>

            <!-- Navegacion (dinamica por rol via JS) -->
            <nav id="sidebar-nav" class="flex-1 overflow-y-auto px-3 py-4 space-y-0.5">
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text"></div>
            </nav>

            <!-- Perfil usuario -->
            <div class="border-t border-slate-100 p-4">
                <div id="user-profile" class="flex items-center gap-3 mb-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-100 to-indigo-200 flex items-center justify-center text-indigo-700 font-semibold text-sm" id="user-avatar">--</div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-semibold text-slate-700 truncate" id="user-name">Cargando...</p>
                        <p class="text-xs text-slate-400 capitalize" id="user-role">--</p>
                    </div>
                </div>
                <button onclick="AuthActions.logout()" class="w-full text-xs text-slate-400 hover:text-red-500 transition-colors flex items-center justify-center gap-1.5 py-2 rounded-lg hover:bg-slate-50">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l3 3m0 0l-3 3m3-3H2.25"/>
                    </svg>
                    Cerrar sesion
                </button>
            </div>
        </aside>

        <!-- Overlay para mobile -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/40 z-40 lg:hidden hidden" onclick="Utils.toggleSidebar()"></div>

        <!-- ============================ Contenido ============================ -->
        <div class="flex-1 flex flex-col overflow-hidden">

            <!-- Header -->
            <header class="bg-white/80 backdrop-blur-sm border-b border-slate-200/60 px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <button onclick="Utils.toggleSidebar()" class="lg:hidden text-slate-400 hover:text-slate-600 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
                        </svg>
                    </button>
                    <h1 class="text-lg font-bold text-slate-800 tracking-tight" id="page-title">{% block page_title %}Dashboard{% endblock %}</h1>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-xs text-slate-400 hidden sm:block" id="current-date"></span>
                    <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse-soft" title="En linea"></div>
                </div>
            </header>

            <!-- Contenido principal -->
            <main class="flex-1 overflow-y-auto p-6">
                {% block content %}{% endblock %}
            </main>

            <!-- Footer con branding CodexSoto -->
            <footer class="bg-white/60 backdrop-blur-sm border-t border-slate-100 px-6 py-2.5 flex items-center justify-between">
                <span class="text-[11px] text-slate-300">&copy; 2026 MedCenter Premium</span>
                <a href="https://codexsoto.com/" target="_blank" rel="noopener" class="codexsoto-brand">
                    <span>Powered by</span>
                    <span class="font-semibold tracking-tight text-slate-500">CodexSoto</span>
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                </a>
            </footer>
        </div>
    </div>
    {% endblock %}

    <!-- ============================ Scripts globales ============================ -->
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/toasts.js') }}"></script>
    <script src="{{ url_for('static', filename='js/skeletons.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/sidebar.js') }}"></script>

    {% block scripts %}{% endblock %}
</body>
</html>
